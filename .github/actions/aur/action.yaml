name: 'Arch Linux User Repository (AUR) GitHub Action'
description: ''
author: 'JamieMagee'
branding:
  icon: 'package'
  color: 'blue'
inputs:
  action:
    description: "Which action to take. Can be 'validate' or 'updpkgsums'"
    required: true
  pkgname:
    description: 'Name of package'
    required: true
  ccache_dir:
    description: "Host path to ccache"
    required: false
    default: ""
runs:
  using: docker
  image: docker://ghcr.io/fabsegp/aur-packages/aur-action@sha256:d1e2f5821625fb4db70020ae7382d457b72ca71221b41200a05ef47f37d5ce31
  args:
    - ${{ inputs.action }}
    - ${{ inputs.pkgname }}
    - ${{ inputs.ccache_dir }}
