name: publish

on:
  push:
    branches: [ main ]
    paths: [ '*/PKGBUILD' ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find updated package
        run: |
          #!/usr/bin/env bash
          set -euxo pipefail

          echo "pkgbuild=$(git diff --name-only HEAD HEAD~1 "*/PKGBUILD" | head -1 | xargs dirname)" >> $GITHUB_ENV

      - name: Update checksums
        if: ${{ env.pkgbuild != '' }}
        uses: ./.github/actions/aur
        with:
          action: 'updpkgsums'
          pkgname: ${{ env.pkgbuild }}

      - name: Commit
        if: ${{ env.pkgbuild != '' }}
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          file_pattern: '*/PKGBUILD */.SRCINFO'
          commit_message: 'chore: update PKGBUILD checksums'
          commit_user_name: 'FabseGP'
          commit_user_email: 'fabse_utilities@pm.me'
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_PAT }}

      - name: Pull latest changes
        if: ${{ env.pkgbuild != '' }}
        run: git pull origin main --rebase

      - name: Publish package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        if: ${{ env.pkgbuild != '' }}
        with:
          pkgname: ${{ env.pkgbuild }}
          pkgbuild: ${{ env.pkgbuild }}/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "ci: update package"
          ssh_keyscan_types: rsa,ecdsa,ed25519
