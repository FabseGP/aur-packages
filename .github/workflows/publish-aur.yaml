name: publish aur package
on:
  push:
    branches: [ main ]
    paths: [ '*/PKGBUILD' ]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Find updated package
        run: |
          #!/usr/bin/env bash
          set -euxo pipefail
          echo "pkgbuild=$(git diff --name-only HEAD HEAD~1 "*/PKGBUILD" | head -1 | xargs dirname)" >> $GITHUB_ENV
      - name: Update checksums
        if: ${{ env.pkgbuild != '' }}
        uses: ./.github/actions/aur
        with:
          action: 'updpkgsums'
          pkgname: ${{ env.pkgbuild }}
      - name: Extract version from .SRCINFO
        if: ${{ env.pkgbuild != '' }}
        id: version
        run: |
          srcinfo="${{ env.pkgbuild }}/.SRCINFO"
          pkgver=$(grep -m1 'pkgver =' "$srcinfo" | cut -d' ' -f3)
          pkgrel=$(grep -m1 'pkgrel =' "$srcinfo" | cut -d' ' -f3)
          echo "version=${pkgver}-${pkgrel}" >> $GITHUB_OUTPUT
      - name: Commit updated checksums
        if: ${{ env.pkgbuild != '' }}
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          file_pattern: '${{ env.pkgbuild }}/PKGBUILD ${{ env.pkgbuild }}/.SRCINFO'
          commit_message: 'chore(${{ env.pkgbuild }}): update checksums to ${{ steps.version.outputs.version }}'
          commit_user_name: 'FabseGP'
          commit_user_email: 'fabse_utilities@pm.me'
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_PAT }}
      - name: List content
        run: |
          ls ${{ env.pkgbuild }}
      - name: Publish package
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        if: ${{ env.pkgbuild != '' }}
        with:
          pkgname: ${{ env.pkgbuild }}
          pkgbuild: ${{ env.pkgbuild }}/PKGBUILD
          assets: ${{ env.pkgbuild }}/*
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "ci(${{ env.pkgbuild }}): update package to ${{ steps.version.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
