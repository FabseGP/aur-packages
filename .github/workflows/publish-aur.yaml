name: publish aur package
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      pkgbuild:
        required: true
        type: string
jobs:
  publish:
    runs-on: ubuntu-latest
    container: ghcr.io/fabsegp/aur-packages/aur-action:main
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Update checksums
        run: |
          /entrypoint.sh updpkgsums "${{ inputs.pkgbuild }}"
      - name: Extract version from .SRCINFO
        id: version
        run: |
          srcinfo="${{ inputs.pkgbuild }}/.SRCINFO"
          pkgver=$(grep -m1 'pkgver =' "$srcinfo" | cut -d' ' -f3)
          pkgrel=$(grep -m1 'pkgrel =' "$srcinfo" | cut -d' ' -f3)
          echo "version=${pkgver}-${pkgrel}" >> $GITHUB_OUTPUT
      - name: Commit updated checksums
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          file_pattern: '${{ inputs.pkgbuild }}/PKGBUILD ${{ inputs.pkgbuild }}/.SRCINFO'
          commit_message: 'chore(${{ inputs.pkgbuild }}): update checksums to ${{ steps.version.outputs.version }}'
          commit_user_name: 'FabseGP'
          commit_user_email: 'fabse_utilities@pm.me'
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_PAT }}
      - name: Publish package
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        with:
          pkgname: ${{ inputs.pkgbuild }}
          pkgbuild: ${{ inputs.pkgbuild }}/PKGBUILD
          assets: ${{ inputs.pkgbuild }}/*
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "ci(${{ inputs.pkgbuild }}): update package to ${{ steps.version.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
