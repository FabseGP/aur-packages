name: validate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
  workflow_dispatch:

env:
  CCACHE_DIR: .ccache

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Find updated package
        run: |
          #!/usr/bin/env bash
          set -euxo pipefail

          echo "pkgbuild=$(git diff --name-only origin/main origin/${GITHUB_HEAD_REF} "*PKGBUILD" | head -1 | xargs dirname)" >> $GITHUB_ENV

      - name: Prepare ccache directory
        if: ${{ env.pkgbuild != '' }}
        run: mkdir -p ${{ github.workspace }}/${{ env.CCACHE_DIR }}

      - name: Cache builds
        if: ${{ env.pkgbuild != '' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ github.workspace }}/${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-cache-${{ env.pkgbuild }}-
          restore-keys: |
            ${{ runner.os }}-cache-${{ env.pkgbuild }}-
            ${{ runner.os }}-cache-

      - name: Validate package
        if: ${{ env.pkgbuild != '' }}
        uses: ./.github/actions/aur
        with:
          action: 'validate'
          pkgname: ${{ env.pkgbuild }}
          ccache_dir: ${{ env.CCACHE_DIR }}
