name: validate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
  workflow_dispatch:

env:
  CCACHE_DIR: /home/runner/.cache/.ccache

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Find updated package
        run: |
          #!/usr/bin/env bash
          set -euxo pipefail

          echo "pkgbuild=$(git diff --name-only origin/main origin/${GITHUB_HEAD_REF} "*PKGBUILD" | head -1 | xargs dirname)" >> $GITHUB_ENV

      - name: Cache builds
        if: ${{ env.pkgbuild != '' }}
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-cache-${{ env.pkgbuild }}-${{ hashFiles('**/PKGBUILD', '**/*.patch') }}
          restore-keys: ${{ runner.os }}-cache-${{ env.pkgbuild }}-

      - name: Validate package
        if: ${{ env.pkgbuild != '' }}
        uses: ./.github/actions/aur
        with:
          action: 'validate'
          pkgname: ${{ env.pkgbuild }}
          cache-dir: ${{ env.CCACHE_DIR }}
