name: validate package
on:
  workflow_dispatch:
  workflow_call:
    inputs:
      pkgbuild:
        required: true
        type: string
env:
  CCACHE_DIR: .ccache
jobs:
  validate:
    runs-on: ubuntu-latest
    container: ghcr.io/fabsegp/aur-packages/aur-action:main
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Prepare ccache directory
        run: sudo mkdir -p "${{ github.workspace }}/${{ env.CCACHE_DIR }}"
      - name: Cache builds
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ github.workspace }}/${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-cache-${{ inputs.pkgbuild }}-${{ hashFiles(inputs.pkgbuild) }}
          restore-keys: |
            ${{ runner.os }}-cache-${{ inputs.pkgbuild }}-
      - name: Validate package
        run: |
          /entrypoint.sh validate "${{ inputs.pkgbuild }}" "${{ env.CCACHE_DIR }}"
  publish:
    needs: validate
    uses: ./.github/workflows/publish-aur.yaml
    with:
      pkgbuild: ${{ inputs.pkgbuild }}
    secrets: inherit
