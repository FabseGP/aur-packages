name: validate package
on:
  push:
    branches: [ main ]
    paths: [ '*/PKGBUILD' ]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
env:
  CCACHE_DIR: .ccache
jobs:
  validate:
    runs-on: ubuntu-latest
    container: ghcr.io/fabsegp/aur-packages/aur-action:main
    outputs:
      pkgbuild: ${{ steps.find_pkg.outputs.pkgbuild }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - name: Find updated package
        id: find_pkg
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PKGBUILD_PATH=$(git diff --name-only origin/main "origin/${GITHUB_HEAD_REF}" -- '*PKGBUILD' | head -n 1)
          else
            PKGBUILD_PATH=$(git diff --name-only HEAD~1 HEAD -- '*PKGBUILD' | head -n 1)
          fi
          if [[ -n "$PKGBUILD_PATH" ]]; then
            pkgbuild=$(dirname "$PKGBUILD_PATH")
            echo "pkgbuild=$pkgbuild" >> "$GITHUB_OUTPUT"
            echo "pkgbuild=$pkgbuild" >> "$GITHUB_ENV"
          else
            echo "pkgbuild=" >> "$GITHUB_OUTPUT"
            echo "pkgbuild=" >> "$GITHUB_ENV"
          fi
      - name: Prepare ccache directory
        if: ${{ env.pkgbuild != '' }}
        run: sudo mkdir -p "${{ github.workspace }}/${{ env.CCACHE_DIR }}"
      - name: Cache builds
        if: ${{ env.pkgbuild != '' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ github.workspace }}/${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-cache-${{ env.pkgbuild }}-${{ hashFiles(env.pkgbuild) }}
          restore-keys: |
            ${{ runner.os }}-cache-${{ env.pkgbuild }}-
      - name: Validate package
        if: ${{ env.pkgbuild != '' }}
        run: |
          /entrypoint.sh validate "${{ env.pkgbuild }}" "${{ env.CCACHE_DIR }}"
  publish:
    needs: validate
    if: ${{ needs.validate.outputs.pkgbuild != '' }}
    uses: ./.github/workflows/publish-aur.yaml
    with:
      pkgbuild: ${{ needs.validate.outputs.pkgbuild }}
    secrets: inherit
