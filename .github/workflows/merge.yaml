name: package update
on:
  push:
    branches: [ main ]
    paths: [ '*/PKGBUILD' ]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
env:
  CCACHE_DIR: .ccache
jobs:
  find-packages:
    runs-on: ubuntu-latest
    outputs:
      pkgbuilds: ${{ steps.find_pkgs.outputs.pkgbuilds }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - name: Find updated packages
        id: find_pkgs
        run: |
          #!/usr/bin/env bash
          set -euo pipefail
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*PKGBUILD' | grep -v '^$' | jq -Rsc .)
          if [ -z "$CHANGED" ]; then
            echo "pkgbuilds=[]" >> "$GITHUB_OUTPUT"
          else
            PKGBUILDS=$(echo "$CHANGED" | jq -Rsc .)
            PKGBUILDS=$(echo "$PKGBUILDS" | tr -d '\n\r ')
            echo "pkgbuilds=$PKGBUILDS" >> "$GITHUB_OUTPUT"
          fi
  prepare-package:
    needs: find-packages
    if: ${{ needs.find-packages.outputs.pkgbuilds != '[]' }}
    strategy:
      matrix:
        pkgbuild: ${{ fromJSON(needs.find-packages.outputs.pkgbuilds) }}
    uses: ./.github/workflows/validate.yaml
    with:
      pkgbuild: ${{ matrix.pkgbuild }}
    secrets: inherit
